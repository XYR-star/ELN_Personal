{% extends 'base.html' %}
{% block body %}
<link rel='stylesheet' href='/planner-assets/styles.css?v=20260721-visual1'>
<link rel='stylesheet' href='/planner-assets/todos.css?v=20260721-add-button1'>

<div class='planner-embedded' data-planner-root data-api-base='/planner-api.php' data-lang='{{ plannerLang }}'>
  <section class='planner-todos' data-todos-root data-todo-mode='editor' data-api-base='/planner-api.php'>
    <div class='planner-todos-head'>
      <div>
        <h2><i class='fas fa-list-check mr-1'></i>Todo</h2>
        <div class='text-muted small'>Mixed quick tasks for today, later, or no fixed date.</div>
      </div>
    </div>
    <details class='todo-composer' data-todo-composer>
      <summary><i class='fas fa-plus fa-fw mr-1'></i>{{ App.getLang() starts with 'zh' ? '添加待办' : 'Add todo' }}</summary>
      <form class='todo-form' data-todo-form>
        <input type='hidden' data-todo-id>
        <label>Task
          <input class='form-control' type='text' data-todo-title placeholder='Check cells, order primers...' required>
        </label>
        <label>Due date
          <input class='form-control' type='date' data-todo-due-date>
        </label>
        <label>Note
          <input class='form-control' type='text' data-todo-note placeholder='Optional'>
        </label>
        <label class='todo-pin-label'>
          <input type='checkbox' data-todo-pinned> Pin
        </label>
        <div class='btn-group'>
          <button class='btn btn-primary' type='submit' data-todo-save>Add todo</button>
          <button class='btn btn-secondary' type='button' data-todo-cancel hidden>Cancel</button>
        </div>
      </form>
      <div class='alert alert-danger py-2' data-todo-error hidden></div>
    </details>
    <div class='todo-list' data-todo-list></div>
    <div class='text-muted' data-todo-empty hidden>No todos yet.</div>
  </section>

  <section class='planner-toolbar'>
    <div class='planner-date-navigation'>
      <button id='today-button' class='btn btn-secondary' type='button' data-i18n='action.today'>今天</button>
      <div class='btn-group' aria-label='日期导航'>
        <button id='prev-button' class='btn btn-secondary' type='button' title='上一页' aria-label='上一页' data-i18n-attr='title:action.previous,aria-label:action.previous'><i class='fas fa-chevron-left fa-fw'></i></button>
        <button id='next-button' class='btn btn-secondary' type='button' title='下一页' aria-label='下一页' data-i18n-attr='title:action.next,aria-label:action.next'><i class='fas fa-chevron-right fa-fw'></i></button>
      </div>
    </div>
    <div class='calendar-title' id='calendar-title'></div>
    <div class='segmented' aria-label='视图模式' data-i18n-attr='aria-label:view.label'>
      <button type='button' data-view='month' data-i18n='view.month'>月</button>
      <button class='active' type='button' data-view='week' data-i18n='view.week'>周</button>
      <button type='button' data-view='day' data-i18n='view.day'>今日</button>
    </div>
    <label class='planner-filter'><span data-i18n='filter.type'>类型</span>
      <select id='type-filter' class='form-control'>
        <option value='' data-i18n='filter.all'>全部</option>
      </select>
    </label>
    <label class='planner-filter'><span data-i18n='filter.status'>状态</span>
      <select id='status-filter' class='form-control'>
        <option value='' data-i18n='filter.all'>全部</option>
      </select>
    </label>
    <input id='search-input' class='form-control planner-search' placeholder='搜索标题、备注、链接' data-i18n-attr='placeholder:filter.searchPlaceholder'>
  </section>

  <section class='planner-layout'>
    <article class='planner-calendar-panel'>
      <div id='calendar-grid' class='calendar-grid'></div>
    </article>
    <aside class='planner-side-panel'>
      <div class='planner-side-head'>
        <div>
          <h2 data-i18n='side.selectedDate'>选中日期</h2>
          <p class='muted'><span id='selected-date'></span><span id='selected-count'></span></p>
        </div>
        <button id='selected-new-plan-button' class='btn btn-secondary btn-sm' type='button'><i class='fas fa-plus fa-fw mr-1'></i><span data-i18n='action.newPlan'>新建计划</span></button>
      </div>
      <div id='selected-list' class='plan-list'></div>
    </aside>
  </section>
</div>

<dialog id='plan-dialog' class='planner-modal'>
  <form id='plan-form' class='planner-modal-card'>
    <div class='planner-modal-header'>
      <h2 id='dialog-title'>新建计划</h2>
      <button id='dialog-close' class='btn btn-sm btn-secondary' type='button' aria-label='关闭' data-i18n-attr='aria-label:dialog.close'>×</button>
    </div>
    <input name='id' type='hidden'>
    <div class='planner-form-grid'>
      <label><span data-i18n='field.title'>标题</span><input class='form-control' name='title' required placeholder='例如：Day 1 mRNA 转染' data-i18n-attr='placeholder:field.titlePlaceholder'></label>
      <label><span data-i18n='field.type'>类型</span><select class='form-control' name='type' id='type-select'></select></label>
      <label><span data-i18n='field.start'>开始时间</span><input class='form-control' name='start' type='datetime-local' required></label>
      <label><span data-i18n='field.end'>结束时间</span><input class='form-control' name='end' type='datetime-local'></label>
      <label><span data-i18n='field.status'>状态</span><select class='form-control' name='status' id='status-select'></select></label>
      <label><span data-i18n='field.experimentUrl'>关联实验 URL</span><input class='form-control' name='experimentUrl' placeholder='/experiments.php?mode=edit&amp;id=1'></label>
      <label><span data-i18n='field.itemUrl'>关联资源 URL</span><input class='form-control' name='itemUrl' placeholder='/database.php?mode=edit&amp;id=1'></label>
    </div>
    <label><span data-i18n='field.note'>备注</span><textarea class='form-control' name='note' rows='4' placeholder='步骤、提醒、条件、注意事项' data-i18n-attr='placeholder:field.notePlaceholder'></textarea></label>
    <div id='planner-form-error' class='alert alert-danger mb-0' hidden></div>
    <div class='planner-modal-actions'>
      <button class='btn btn-primary' type='submit' data-i18n='action.save'>保存</button>
      <button class='btn btn-secondary' id='save-another-button' type='submit' data-save-another data-i18n='action.saveAnother'>保存并继续新建</button>
      <button class='btn btn-secondary' id='mark-done-button' type='button' data-i18n='action.markDone'>标记完成</button>
      <button class='btn btn-secondary' id='delay-button' type='button' data-i18n='action.delay'>推迟</button>
      <button class='btn btn-danger' id='delete-button' type='button' data-i18n='action.delete'>删除</button>
    </div>
  </form>
</dialog>

<script type='module' src='/planner-assets/app.js?v=20260721-visual2'></script>
<script defer src='/planner-assets/todos.js?v=20260624-todo1'></script>
{% endblock %}
